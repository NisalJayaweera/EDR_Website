# fly.toml app configuration file for edr-http-site-dark-raindrop-5062

app = 'edr-http-site-dark-raindrop-5062'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = '15s'
  timeout = '10s'
  grace_period = '60s'
  method = 'GET'
  path = '/'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
