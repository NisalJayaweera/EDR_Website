# fly.toml app configuration file for edr-http-site-dark-raindrop-5062

app = 'edr-http-site-dark-raindrop-5062'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

# ---------------------------------------------------------------
# Single [[services]] block exposing:
#   port 80  → normal web access (browser / HTTP)
#   port 8080 → SIM7070G / cellular device access
#
# WHY port 8080?
#   Dialog Axiata (and many carriers) run a transparent proxy on
#   port 80 that returns fake 404s before requests reach our server.
#   Port 8080 bypasses this proxy entirely.
#
# SIM7070G usage:
#   AT+SHCONF="URL","http://edr-http-site-dark-raindrop-5062.fly.dev:8080"
# ---------------------------------------------------------------
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = false

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 8080
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[services]]
  internal_port = 9099
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 9099
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
